services:
  # 🚀 Managed Redis Cache
  - type: keyvalue
    name: nexly-cache
    plan: free
    ipAllowList: []

  # 🌐 Main Web Service (Django)
  - type: web
    name: nexly-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nexly-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.12

  # ⚙️ Background Worker (Celery)
  - type: worker
    name: nexly-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A myproject worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nexly-cache
          property: connectionString
      - key: SECRET_KEY
        sync: false # This tells Render to use the same generated value across services if they share the same key name in the same blueprint
      - key: DEBUG
        value: "False"

# 🗄️ Managed PostgreSQL Database
databases:
  - name: nexly-db
    plan: free
