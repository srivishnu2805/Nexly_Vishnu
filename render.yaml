services:
  # 🚀 Managed Redis Cache
  - type: keyvalue
    name: nexly-cache
    plan: free
    ipAllowList: []

  # 🌐 All-in-One Web Service (Django + Celery)
  - type: web
    name: nexly-web
    env: python
    buildCommand: "chmod +x start.sh && ./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nexly-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.12

# 🗄️ Managed PostgreSQL Database
databases:
  - name: nexly-db
    plan: free
