services:
  # 🚀 Managed Redis Cache (now type: keyvalue)
  - type: keyvalue
    name: nexly-cache
    plan: free
    ipAllowList: [] # Only allow internal connections

  # 🌐 Main Web Service (Django)
  - type: web
    name: nexly-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nexly-cache
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.10.12

  # ⚙️ Background Worker (Celery)
  - type: worker
    name: nexly-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A myproject worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexly-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nexly-cache
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: nexly-web
          property: SECRET_KEY

# 🗄️ Managed PostgreSQL Database
databases:
  - name: nexly-db
    plan: free
